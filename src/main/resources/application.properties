spring.application.name=crimerate

# Portul pe care va rula serverul tau de backend
server.port=8080

# Conexiunea la baza de date MySQL (crimerate_db)
spring.datasource.url=jdbc:mysql://localhost:3306/crimerate_db?serverTimezone=UTC
spring.datasource.username=root

# AICI TREBUIE SA PUI PAROLA TA NOUA:
spring.datasource.password=1234

# Setari pentru Hibernate / JPA (ajuta Spring Boot sa comunice cu MySQL)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true.hibernate.dialect=org.hibernate.dialect.MySQLDialect
<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panou Admin - CrimeRate RO</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        /* Stiluri specifice pentru tabelul de admin ca să arate premium */
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-main);
            font-size: 0.95rem;
        }
        .admin-table th {
            text-align: left;
            padding: 15px;
            color: var(--text-muted);
            font-weight: 500;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }
        .admin-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            vertical-align: middle;
        }
        .admin-table tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }
    </style>
</head>
<body>

<nav class="sidebar" id="sidebar">
    <a href="#" class="sidebar-header" id="profileHeaderBtn">
        <i class="fa-solid fa-user-shield text-warning"></i>
        <span class="logo-text" id="profileHeaderText">Guest</span>
    </a>

    <ul class="nav-links">
        <li>
            <a href="index.html">
                <i class="fa-solid fa-chart-pie"></i>
                <span class="text">Dashboard</span>
            </a>
        </li>
        <li>
            <a href="harta.html">
                <i class="fa-solid fa-map-location-dot"></i>
                <span class="text">Map</span>
            </a>
        </li>

        <li id="loginMenuItem">
            <a href="login.html">
                <i class="fa-solid fa-right-to-bracket"></i>
                <span class="text">Autentificare</span>
            </a>
        </li>

        <li id="raportareMenuItem" style="display: none;">
            <a href="raportare.html">
                <i class="fa-solid fa-bullhorn"></i>
                <span class="text">Raportează Incident</span>
            </a>
        </li>

        <li id="adminMenuItem" style="display: none;">
            <a href="admin.html" style="color: #f59e0b;">
                <i class="fa-solid fa-shield-halved"></i>
                <span class="text">Panou Admin</span>
            </a>
        </li>

        <li id="logoutMenuItem" style="display: none;">
            <a href="#" onclick="logout()">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                <span class="text">Deconectare</span>
            </a>
        </li>
    </ul>

    <div class="sidebar-footer">
        <span class="small-text">CrimeRate RO</span>
    </div>
</nav>

<main class="main-content">

    <div class="dashboard-header" style="margin-bottom: 30px;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="width: 6px; height: 35px; background-color: #f59e0b; border-radius: 4px;"></div>
            <div>
                <h1 style="color: var(--bg-dark); margin: 0; font-size: 1.8rem;">Aprobare Incidente</h1>
                <p style="color: var(--text-muted); margin: 5px 0 0 0;">Gestionează rapoartele trimise de cetățeni înainte să apară pe hartă.</p>
            </div>
        </div>
    </div>

    <div class="premium-dark-panel" style="padding: 25px; overflow-x: auto;">
        <table class="admin-table">
            <thead>
            <tr>
                <th style="width: 15%;">Data</th>
                <th style="width: 15%;">Raportor</th>
                <th style="width: 15%;">Oraș</th>
                <th style="width: 15%;">Tip Infracțiune</th>
                <th style="width: 25%;">Descriere</th>
                <th style="width: 15%; text-align: center;">Acțiuni</th>
            </tr>
            </thead>
            <tbody id="tabelAdminBody">
            <tr>
                <td colspan="6" style="text-align: center; color: var(--text-muted); padding: 30px;">
                    <i class="fa-solid fa-spinner fa-spin" style="margin-right: 10px;"></i> Se încarcă datele...
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</main>

<script src="app.js"></script>
</body>
</html>
